# NodePort Service exposing the Spring Boot API to the local host machine
apiVersion: v1
kind: Service
metadata:
  name: secure-api-service
  namespace: secure-api-ns
  labels:
    app.kubernetes.io/name: secure-api
spec:
  type: NodePort
  selector:
    app: secure-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      # Matches the containerPort exposed in kind-config.yaml
      nodePort: 30080
