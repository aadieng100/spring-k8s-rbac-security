# Binding the dedicated ServiceAccount to the restricted Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secure-api-rb
  namespace: secure-api-ns
  labels:
    app.kubernetes.io/name: secure-api
    app.kubernetes.io/part-of: spring-rbac-showcase
subjects:
  - kind: ServiceAccount
    name: secure-api-sa
    namespace: secure-api-ns
roleRef:
  # Reference to our localized Role (and NOT a ClusterRole)
  kind: Role
  name: secure-api-role
  apiGroup: rbac.authorization.k8s.io
